<div class="register-container">
  <div class="card">
    <h2>Create Account</h2>
    <p class="subtitle">Fill in your details to register</p>

    <div class="avatar-wrapper">
      <div class="avatar" (click)="fileInput.click()">
        <img *ngIf="previewUrl; else placeholder" [src]="previewUrl" alt="Avatar" />
        <ng-template #placeholder>
          <div class="placeholder"></div>
        </ng-template>
        <div class="upload-icon">📷</div>
      </div>

      <input type="file" #fileInput accept="image/*" hidden (change)="onFileSelected($event)" />
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
      <label>Name</label>
      <input type="text" formControlName="name" placeholder="Enter your full name" />
      <div class="error" *ngIf="submited && form['name'].invalid">Name is required.</div>

      <label>Email</label>
      <input type="email" formControlName="email" placeholder="your.email@gmail.com" />
      <div class="error" *ngIf="submited && form['email'].errors">
        <span *ngIf="form['email'].errors['required']">Email is required.</span>
        <span *ngIf="form['email'].errors['email']">Enter a valid email.</span>
      </div>

      <label>Password</label>
      <div class="password-wrapper">
        <input
          [type]="showPassword ? 'text' : 'password'"
          formControlName="password"
          placeholder="Enter your password"
        />
        <span class="toggle-icon" (click)="showPassword = !showPassword">
          <svg
            *ngIf="showPassword"
            xmlns="http://www.w3.org/2000/svg"
            class="icon"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M13.875 18.825A10.05 10.05 0 0112 19c-4.477 0-8.268-2.943-9.542-7a9.97 9.97 0 012.72-4.568M6.2 6.2A9.956 9.956 0 0112 5c4.477 0 8.268 2.943 9.542 7a9.97 9.97 0 01-2.645 4.59M6.2 6.2l11.6 11.6M6.2 6.2L4 4m13.8 13.8L20 20"
            />
          </svg>

          <svg
            *ngIf="!showPassword"
            xmlns="http://www.w3.org/2000/svg"
            class="icon"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
            />
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M2.458 12C3.732 7.943 7.523 5 12 5s8.268 2.943 9.542 7c-1.274 4.057-5.065 7-9.542 7S3.732 16.057 2.458 12z"
            />
          </svg>
        </span>
      </div>

      <div class="error" *ngIf="submited && form['password'].errors">
        <span *ngIf="form['password'].errors['required']">Password is required.</span>
        <span *ngIf="form['password'].errors['minlength']">Minimum length is 8 characters.</span>
      </div>

      <label>Confirm Password</label>
      <div class="password-wrapper">
        <input
          [type]="showConfirm ? 'text' : 'password'"
          formControlName="confirmPassword"
          placeholder="Confirm your password"
        />
        <span class="toggle-icon" (click)="showConfirm = !showConfirm">
          <svg
            *ngIf="showConfirm"
            xmlns="http://www.w3.org/2000/svg"
            class="icon"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M13.875 18.825A10.05 10.05 0 0112 19c-4.477 0-8.268-2.943-9.542-7a9.97 9.97 0 012.72-4.568M6.2 6.2A9.956 9.956 0 0112 5c4.477 0 8.268 2.943 9.542 7a9.97 9.97 0 01-2.645 4.59M6.2 6.2l11.6 11.6M6.2 6.2L4 4m13.8 13.8L20 20"
            />
          </svg>

          <svg
            *ngIf="!showConfirm"
            xmlns="http://www.w3.org/2000/svg"
            class="icon"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
            />
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M2.458 12C3.732 7.943 7.523 5 12 5s8.268 2.943 9.542 7c-1.274 4.057-5.065 7-9.542 7S3.732 16.057 2.458 12z"
            />
          </svg>
        </span>
      </div>

      <div
        class="error"
        *ngIf="submited && (form['confirmPassword'].invalid || registerForm.errors?.['passwordMismatch'])"
      >
        <span *ngIf="form['confirmPassword'].errors?.['required']">Confirm your password.</span>
        <span *ngIf="registerForm.errors?.['passwordMismatch']">Passwords do not match.</span>
      </div>

      <button type="submit" class="btn">Register</button>

      <p class="system-message">{{ message }}</p>
    </form>

    <p class="bottom-text">
      Already have an account?
      <a class="login-link" (click)="goToLogin()">LogIn</a>
    </p>
  </div>
</div>
