@if (isLoggedIn()) {
<aside class="sidebar">
  <div class="sidebar-header">
    <div class="app-icon">⚡</div>
    <div>
      <h2 class="app-name">MyAuthApp</h2>
    </div>
  </div>

  <div class="sidebar-section">
    <p class="section-label">MAIN MENU</p>

    <a routerLink="/dashboard" routerLinkActive="active" class="nav-item">
      <img src="/icons/dashboard.svg" />
      <span>Dashboard</span>
    </a>

    <a routerLink="/profile" routerLinkActive="active" class="nav-item">
      <img src="/icons/user.svg" />
      <span>Profile</span>
    </a>
  </div>

  <div class="sidebar-section">
    <p class="section-label">RESOURCES</p>

    <a routerLink="/users" routerLinkActive="active" class="nav-item">
      <img src="/icons/users.svg" />
      <span>Users</span>
    </a>

    <a href="http://localhost:8000/api-docs" target="_blank" class="nav-item">
      <img src="/icons/document.svg" />
      <span>API Docs</span>
    </a>
  </div>

  <div class="sidebar-footer">
    <button class="logout-btn" (click)="logout()">
      <img src="/icons/logout.svg" />
      <span>Logout</span>
    </button>
  </div>
</aside>
}
